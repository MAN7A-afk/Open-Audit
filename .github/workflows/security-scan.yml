name: Security Scan (Secrets + Dependencies)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

jobs:
  gitleaks:
    name: Secret Scanning with Gitleaks
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_SARIF: true
          # Must match the filename the action writes — gitleaks-action@v2
          # produces results.sarif by default when GITLEAKS_ENABLE_SARIF=true
          GITLEAKS_SARIF_FILE: results.sarif

      - name: Show SARIF outputs (debug)
        if: always()
        run: |
          echo "Workspace: $GITHUB_WORKSPACE"
          ls -la .
          ls -la *.sarif || echo "No .sarif files found"

      - name: Upload SARIF to GitHub
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
          category: gitleaks

  trivy:
    name: Dependency Scanning with Trivy
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        # Pin to the major tag — resolves to the latest valid v0.x.y release
        # without hitting a missing exact patch tag (e.g. 0.28.0 / 0.29.0)
        uses: aquasecurity/trivy-action@v0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          exit-code: "1"
          severity: CRITICAL,HIGH
          scanners: vuln
          hide-progress: true

      - name: Upload Trivy SARIF to GitHub
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy
